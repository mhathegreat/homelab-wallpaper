<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab Dashboard</title>

  <!-- Font: JetBrains Mono (Google Fonts CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ---- global ---------------------------------------------------------- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: default;              /* OS cursor stays visible over the wallpaper */
      font-family: 'JetBrains Mono', monospace;
      color: #00ff88;
    }

    /* ---- animation target ------------------------------------------------ */
    #bg { position: fixed; inset: 0; z-index: 0; }
    #bg canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ---- clock (top-right) ----------------------------------------------- */
    #clock {
      position: fixed; top: 20px; right: 24px;
      text-align: right; z-index: 5; pointer-events: none;
    }
    #clock .time {
      font-size: 46px; font-weight: 700; line-height: 1;
      color: rgba(0, 255, 136, 0.82); letter-spacing: 0.04em;
      text-shadow: 0 0 18px rgba(0, 255, 136, 0.35);
    }
    #clock .date {
      font-size: 11px; font-weight: 400; margin-top: 7px;
      color: rgba(0, 255, 136, 0.5); letter-spacing: 0.18em;
    }

    /* ---- hint (bottom-right, fades out) ---------------------------------- */
    #hint {
      position: fixed; bottom: 18px; right: 60px;
      font-size: 9px; color: rgba(0, 255, 136, 0.15);
      letter-spacing: 0.1em; pointer-events: none; z-index: 5;
      transition: opacity 2s ease;
    }

    /* ---- scanline overlay ------------------------------------------------ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 2px,
        rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="clock"></div>
  <div id="hint">click &#9881; (bottom-right) to configure &middot; drag headers &middot; resize from corner</div>

  <!-- ====================================================================
       Load order (per spec):
         1. animation library (tsParticles bundle, CDN)
         2. src/config.js
         3. src/stats.js
         4. src/cards.js
         5. src/particles.js
         6. src/panel.js
       =================================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <script src="src/config.js"></script>
  <!-- optional personal overrides — gitignored, absent in the public repo -->
  <script src="src/config.local.js" onerror="void 0"></script>
  <script src="src/stats.js"></script>
  <script src="src/cards.js"></script>
  <script src="src/particles.js"></script>
  <script src="src/panel.js"></script>

  <!-- clock + hint (tied to elements in this file) -->
  <script>
    (function () {
      var clock = document.getElementById('clock');
      var timeEl = document.createElement('div'); timeEl.className = 'time';
      var dateEl = document.createElement('div'); dateEl.className = 'date';
      clock.appendChild(timeEl); clock.appendChild(dateEl);

      // pin the clock to the configured screen (multi-monitor stretch)
      function placeClock() {
        var r = (window.WallpaperLayout && window.WallpaperLayout.rect)
          ? window.WallpaperLayout.rect()
          : { x: 0, y: 0, w: window.innerWidth, h: window.innerHeight };
        var pos = (window.CONFIG && window.CONFIG.clockPosition) || 'right';
        clock.style.left = r.x + 'px';
        clock.style.top = (r.y + 24) + 'px';
        clock.style.width = r.w + 'px';
        clock.style.right = 'auto';
        clock.style.textAlign = pos;
        clock.style.paddingLeft = pos === 'left' ? '26px' : '0';
        clock.style.paddingRight = pos === 'right' ? '26px' : '0';
      }
      placeClock();
      window.addEventListener('resize', placeClock);

      var DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      var MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                    'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
      function pad(n) { return (n < 10 ? '0' : '') + n; }

      function tick() {
        var d = new Date();
        timeEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes());
        dateEl.textContent =
          DAYS[d.getDay()] + ' · ' +
          MONTHS[d.getMonth()] + ' ' + pad(d.getDate()) + ' · ' +
          d.getFullYear();
      }
      tick();
      setInterval(tick, 1000);

      // fade the hint out after 8s
      var hint = document.getElementById('hint');
      setTimeout(function () { if (hint) hint.style.opacity = '0'; }, 8000);
    })();
  </script>
</body>
</html>
